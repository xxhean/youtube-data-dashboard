<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic Ranking - YouTube Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="container">
        <header class="main-header">
            <nav class="nav-tabs">
                <a href="/" data-i18n="nav_video">📹 Video Ranking</a>
                <a href="/channels.html" data-i18n="nav_channel">📺 Channel Ranking</a>
                <a href="/topics.html" class="active" data-i18n="nav_topic">🏷️ Topic Ranking</a>
            </nav>
            <div class="header-actions">
                <select id="lang-switcher" class="lang-select">
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                </select>
                <div class="auth-buttons">
                    <button class="btn btn-primary" data-i18n="btn_login_register">Login / Register</button>
                </div>
            </div>
        </header>

        <main>
            <!-- Topics Row -->
            <div class="topics-row" id="topics-container">
                <!-- Topics rendered by js -->
            </div>

            <div class="table-container">
                <table id="topics-table">
                    <thead>
                        <tr>
                            <th style="width: 50px" data-i18n="th_rank">#</th>
                            <th style="width: 140px" data-i18n="th_thumb">Thumbnail</th>
                            <th data-i18n="th_title">Title</th>
                            <th data-i18n="th_date">Publish Date</th>
                            <th data-i18n="th_channel">Channel</th>
                            <th data-i18n="th_views">Views</th>
                            <th data-i18n="th_type">Type</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Content rendered by js -->
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination-container">
                <!-- Pagination rendered by js -->
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/topics.js"></script>
</body>

</html>
