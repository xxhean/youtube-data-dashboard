<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ranking - YouTube Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <nav class="nav-tabs">
                <a href="/" class="active">📹 Video Ranking</a>
                <a href="/channels.html">📺 Channel Ranking</a>
                <a href="/topics.html">🏷️ Topic Ranking</a>
            </nav>
        </header>

        <main>
            <div class="filters-bar">
                <div class="filter-group">
                    <span class="filter-label">Video Type:</span>
                    <div class="toggle-group" id="video-type-filters">
                        <button class="toggle-btn active" data-type="all">All</button>
                        <button class="toggle-btn" data-type="short">Shorts</button>
                        <button class="toggle-btn" data-type="regular">Long Videos</button>
                    </div>
                </div>

                <div class="filter-group">
                    <span class="filter-label">Publish Date:</span>
                    <div class="toggle-group" id="date-filters">
                        <button class="toggle-btn active" data-range="all">All Time</button>
                        <button class="toggle-btn" data-range="week">This Week</button>
                        <button class="toggle-btn" data-range="month">This Month</button>
                    </div>
                </div>

                <div class="filter-group" style="margin-left: auto;">
                    <input type="text" id="search-input" class="search-input" placeholder="Search title or keyword...">
                </div>
            </div>

            <div class="table-container">
                <table id="videos-table">
                    <thead>
                        <tr>
                            <th style="width: 50px">#</th>
                            <th style="width: 140px">Thumbnail</th>
                            <th>Title</th>
                            <th class="sortable" data-sort="publish_date">Publish Date ⇕</th>
                            <th>Channel</th>
                            <th class="sortable active-sort" data-sort="view_count">Views ↓</th>
                            <th style="width: 150px">Keyword</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Content rendered by app.js -->
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination-container">
                <!-- Pagination rendered by app.js -->
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
