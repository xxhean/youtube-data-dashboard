<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ranking - YouTube Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="container">
        <header class="main-header">
            <nav class="nav-tabs">
                <a href="/" class="active" data-i18n="nav_video">📹 Video Ranking</a>
                <a href="/channels.html" data-i18n="nav_channel">📺 Channel Ranking</a>
                <a href="/topics.html" data-i18n="nav_topic">🏷️ Topic Ranking</a>
            </nav>
            <div class="header-actions">
                <select id="lang-switcher" class="lang-select">
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                </select>
                <div class="auth-buttons">
                    <button class="btn btn-primary" data-i18n="btn_login_register">Login / Register</button>
                </div>
            </div>
        </header>

        <main>
            <div class="filters-bar">
                <div class="filter-group">
                    <span class="filter-label" data-i18n="filter_type">Video Type:</span>
                    <div class="toggle-group" id="video-type-filters">
                        <button class="toggle-btn active" data-type="all" data-i18n="btn_all">All</button>
                        <button class="toggle-btn" data-type="short" data-i18n="btn_short">Shorts</button>
                        <button class="toggle-btn" data-type="regular" data-i18n="btn_regular">Long Videos</button>
                    </div>
                </div>

                <div class="filter-group">
                    <span class="filter-label" data-i18n="filter_date">Publish Date:</span>
                    <div class="toggle-group" id="date-filters">
                        <button class="toggle-btn active" data-range="all" data-i18n="btn_all_time">All Time</button>
                        <button class="toggle-btn" data-range="week" data-i18n="btn_week">This Week</button>
                        <button class="toggle-btn" data-range="month" data-i18n="btn_month">This Month</button>
                    </div>
                </div>

                <div class="filter-group" style="margin-left: auto;">
                    <input type="text" id="search-input" class="search-input" placeholder="Search title or keyword..."
                        data-i18n="search_ph">
                </div>
            </div>

            <div class="table-container">
                <table id="videos-table">
                    <thead>
                        <tr>
                            <th style="width: 50px" data-i18n="th_rank">#</th>
                            <th style="width: 140px" data-i18n="th_thumb">Thumbnail</th>
                            <th data-i18n="th_title">Title</th>
                            <th class="sortable" data-sort="publish_date" data-i18n="th_date">Publish Date ⇕</th>
                            <th data-i18n="th_channel">Channel</th>
                            <th class="sortable active-sort" data-sort="view_count" data-i18n="th_views">Views ↓</th>
                            <th style="width: 150px" data-i18n="th_keyword">Keyword</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Content rendered by app.js -->
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination-container">
                <!-- Pagination rendered by app.js -->
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
