<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel Ranking - YouTube Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="container">
        <header class="main-header">
            <nav class="nav-tabs">
                <a href="/" data-i18n="nav_video">📹 Video Ranking</a>
                <a href="/channels.html" class="active" data-i18n="nav_channel">📺 Channel Ranking</a>
                <a href="/topics.html" data-i18n="nav_topic">🏷️ Topic Ranking</a>
            </nav>
            <div class="header-actions">
                <select id="lang-switcher" class="lang-select">
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                </select>
                <div class="auth-buttons">
                    <button class="btn btn-primary" data-i18n="btn_login_register">Login / Register</button>
                </div>
            </div>
        </header>

        <main>
            <div class="filters-bar">
                <div class="filter-group">
                    <span class="filter-label" data-i18n="filter_metric">Metric:</span>
                    <div class="toggle-group" id="metric-filters">
                        <button class="toggle-btn active" data-metric="views" data-i18n="btn_views">Views</button>
                        <button class="toggle-btn" data-metric="subscribers" data-i18n="btn_subs">Subscribers</button>
                    </div>
                </div>

                <div class="filter-group">
                    <span class="filter-label" data-i18n="filter_ranking">Ranking Type:</span>
                    <div class="toggle-group" id="type-filters">
                        <button class="toggle-btn active" data-type="total" data-i18n="btn_total">Total</button>
                        <button class="toggle-btn" data-type="growth" data-i18n="btn_growth">Growth</button>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table id="channels-table">
                    <thead>
                        <tr>
                            <th style="width: 80px" data-i18n="th_rank">Rank ⇕</th>
                            <th data-i18n="th_channel">Channel ⇕</th>
                            <th data-i18n="th_videos">Videos ⇕</th>
                            <th data-i18n="th_subs">Subs ⇕</th>
                            <th data-i18n="th_tot_views">Total Views ⇕</th>
                            <th data-i18n="th_day_views">Daily Views ⇕</th>
                            <th data-i18n="th_day_subs">Daily Subs ⇕</th>
                            <th data-i18n="th_country">Country ⇕</th>
                            <th style="width: 300px" data-i18n="th_latest">Latest Videos</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Content rendered by js -->
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination-container">
                <!-- Pagination rendered by js -->
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/channels.js"></script>
</body>

</html>
